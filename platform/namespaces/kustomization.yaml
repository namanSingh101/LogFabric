apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: logfabric-namespaces
  annotations:
    description: "Manages all LogFabric cluster namespaces"
    
resources:
  - logfabric-app.yaml
  - logfabric-ci.yaml
  - logfabric-data.yaml
  - logfabric-messaging.yaml
  - logfabric-observability.yaml