apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: logfabric-postgres

namespace: logfabric-data

resources:
  - ../../base

images:
  - name: doc105b/postgres-custom
    newTag: latest

secretGenerator:
- name: postgres-secret
  envs: 
    - .env 
  options:
    disableNameSuffixHash: true

configMapGenerator:
  - name: postgres-config
    literals:
      - POSTGRES_DB=logfabric
      - POSTGRES_HOST=postgres.logfabric-data.svc.cluster.local
      - POSTGRES_PORT=5432
      - PGDATA=/var/lib/postgresql/data/pgdata 