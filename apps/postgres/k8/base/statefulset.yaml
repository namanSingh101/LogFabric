apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stateful
  namespace: logfabric-data
  labels:
    app: postgres
    project: logfabric
    tier: data 
    component: postgres

spec:

  serviceName: postgres-headless
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: logfabric/postgres-custom:1.0
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "500Mi"
              cpu: "500m"
          env: 
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30   # give postgres time to start
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgres/data 

  volumeClaimTemplates:
    - metadata:
        name: postgres-data 
        namespace: logfabric-data
        labels:
          app: postgres
          project: logfabric
          tier: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
